version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: harmoniq
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    command: sh -c "npm install && npm run prisma:generate && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./:/usr/src/app
      - ./storage:/data/storage
    env_file: .env
    environment:
      - STORAGE_PATH=/data/storage
    depends_on:
      - db
      - redis

volumes:
  postgres-data:
